<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админ панель</title>

<style>

body{
font-family:Arial;
background:#f6e8ec;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#e86c8a;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#d85c7b;
}

</style>

</head>

<body>

<div class="container">

<h2>Добавить историю</h2>

<textarea id="storyText" placeholder="Введите историю..."></textarea>

<button onclick="addStory()">Добавить</button>

<p id="status"></p>



<h2>Добавить совет</h2>

<input id="faqQuestion" placeholder="Введите вопрос">

<textarea id="faqAnswer" placeholder="Введите ответ"></textarea>

<button onclick="addFAQ()">Добавить совет</button>

<p id="faqStatus"></p>

</div>



<h2>Добавить видео</h2>

<input id="videoTitleInput" placeholder="Название видео">

<input id="videoUrlInput" placeholder="URL видео">

<button onclick="addVideo()">Добавить видео</button>

<script type="module" src="admin.js"></script>

</body>
</html>
