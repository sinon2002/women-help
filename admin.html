<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админ панель</title>

<style>
  body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
}

.sidebar {
  width: 200px;
  background: #2c2c2c;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #444;
  border: none;
  color: white;
  cursor: pointer;
}

.content {
  flex: 1;
  padding: 20px;
}

.hidden {
  display: none;
}

.cards {
  display: flex;
  gap: 20px;
}

.cards div {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 10px;
}



</style>

</head>

<body>

<div class="admin">
  <aside class="sidebar">
    <h2>Админ</h2>
    <button onclick="showTab('dashboard')">🏠 Главная</button>
    <button onclick="showTab('stories')">📚 Истории</button>
    <button onclick="showTab('faq')">💡 Советы</button>
    <button onclick="showTab('videos')">🎥 Видео</button>
  </aside>

  <main class="content">
    
    <!-- Главная -->
    <section id="dashboard" class="tab">
      <h2>Статистика</h2>
      <div class="cards">
        <div>Истории: <span id="storiesCount">0</span></div>
        <div>Советы: <span id="faqCount">0</span></div>
        <div>Видео: <span id="videosCount">0</span></div>
      </div>
    </section>

    <!-- Истории -->
    <section id="stories" class="tab hidden">
      <h2>Истории</h2>
      <textarea id="storyInput"></textarea>
      <button onclick="addStory()">Добавить</button>

      <div id="storiesList"></div>
    </section>

    <!-- Советы -->
    <section id="faq" class="tab hidden">
      <h2>Советы</h2>
      <input id="questionInput" placeholder="Вопрос">
      <textarea id="answerInput"></textarea>
      <button onclick="addFaq()">Добавить</button>

      <div id="faqList"></div>
    </section>

    <!-- Видео -->
    <section id="videos" class="tab hidden">
      <h2>Видео</h2>
      <input id="videoTitle" placeholder="Название">
      <input id="videoUrl" placeholder="URL">
      <button onclick="addVideo()">Добавить</button>

      <div id="videosList"></div>
    </section>

  </main>
</div>
<script type="module" src="admin.js"></script>

</body>
</html>
